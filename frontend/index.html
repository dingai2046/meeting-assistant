<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会议助理 - Meeting Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-100">
    <div x-data="meetingApp()" class="container mx-auto p-8 max-w-6xl">

        <!-- 头部 -->
        <div class="bg-white rounded-lg shadow p-6 mb-6 flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-bold">🎯 会议助理</h1>
                <p class="text-gray-500 mt-1">实时翻译 · 会议总结 · 任务分配</p>
            </div>
            <div class="text-right">
                <p class="text-sm text-gray-500">会议时长</p>
                <p class="text-3xl font-mono font-bold" x-text="formatTime(duration)">00:00</p>
            </div>
        </div>

        <!-- 控制面板 -->
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <div class="flex gap-4 flex-wrap">
                <button @click="toggleRecording()"
                    :class="recording ? 'bg-red-500 hover:bg-red-600' : 'bg-green-500 hover:bg-green-600'"
                    class="text-white px-8 py-3 rounded-lg font-bold text-lg transition">
                    <span x-text="recording ? '⏹ 停止会议' : '🎤 开始会议'"></span>
                </button>

                <button x-show="meetingId" @click="getSummary()"
                    :disabled="summarizing"
                    class="bg-purple-500 hover:bg-purple-600 disabled:bg-gray-400 text-white px-6 py-3 rounded-lg font-bold transition">
                    <span x-text="summarizing ? '生成中...' : '📝 生成总结'"></span>
                </button>

                <div class="ml-auto flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full" :class="connected ? 'bg-green-500' : 'bg-gray-300'"></span>
                    <span class="text-sm text-gray-600" x-text="connected ? '已连接' : '未连接'"></span>
                </div>
            </div>
        </div>

        <!-- 手动输入翻译 -->
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-lg font-bold mb-3">⌨️ 输入翻译</h2>
            <div class="flex gap-3">
                <input x-model="inputText"
                    @keydown.enter="translateText()"
                    type="text"
                    placeholder="输入文字（中文→英文 / English→中文）"
                    class="flex-1 border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
                <button @click="translateText()"
                    :disabled="translating"
                    class="bg-blue-500 hover:bg-blue-600 disabled:bg-gray-400 text-white px-6 py-2 rounded-lg font-bold transition">
                    <span x-text="translating ? '...' : '翻译'"></span>
                </button>
            </div>
        </div>

        <!-- 翻译记录 -->
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-bold">💬 翻译记录 (<span x-text="messages.length"></span>)</h2>
                <button @click="messages = []" x-show="messages.length > 0"
                    class="text-sm text-gray-400 hover:text-red-500">清空</button>
            </div>
            <div class="space-y-3 max-h-96 overflow-y-auto">
                <template x-for="msg in messages" :key="msg.id">
                    <div class="border-l-4 border-blue-400 pl-4 py-2 bg-gray-50 rounded-r">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-xs bg-blue-100 text-blue-700 px-2 py-0.5 rounded" x-text="msg.direction"></span>
                            <span class="text-xs text-gray-400" x-text="msg.time"></span>
                        </div>
                        <p class="text-gray-800" x-text="msg.original"></p>
                        <p class="text-blue-600 font-medium mt-1" x-text="msg.translation"></p>
                    </div>
                </template>
                <div x-show="messages.length === 0" class="text-center text-gray-400 py-8">
                    输入文字或开始录音
                </div>
            </div>
        </div>

        <!-- 会议总结 -->
        <div x-show="summary" class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-lg font-bold mb-4">📋 会议总结</h2>
            <div class="prose max-w-none text-gray-700 whitespace-pre-wrap text-sm" x-text="summary"></div>
        </div>

        <!-- 统计 -->
        <div class="grid grid-cols-3 gap-4">
            <div class="bg-white rounded-lg shadow p-4 text-center">
                <p class="text-gray-500 text-sm">翻译条数</p>
                <p class="text-2xl font-bold text-blue-600" x-text="messages.length"></p>
            </div>
            <div class="bg-white rounded-lg shadow p-4 text-center">
                <p class="text-gray-500 text-sm">会议ID</p>
                <p class="text-xs font-mono text-gray-700 mt-1" x-text="meetingId || '-'"></p>
            </div>
            <div class="bg-white rounded-lg shadow p-4 text-center">
                <p class="text-gray-500 text-sm">状态</p>
                <p class="text-lg font-bold mt-1" :class="recording ? 'text-red-500' : 'text-gray-500'"
                   x-text="recording ? '录音中' : '待机'"></p>
            </div>
        </div>
    </div>

    <script>
        function meetingApp() {
            return {
                recording: false,
                connected: false,
                messages: [],
                ws: null,
                meetingId: null,
                duration: 0,
                timer: null,
                inputText: '',
                translating: false,
                summarizing: false,
                summary: '',

                formatTime(s) {
                    return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
                },

                async toggleRecording() {
                    if (!this.recording) {
                        const res = await fetch('/api/meeting/start', {method: 'POST'});
                        const data = await res.json();
                        this.meetingId = data.meeting_id;
                        this.recording = true;
                        this.duration = 0;
                        this.timer = setInterval(() => this.duration++, 1000);
                        this.connectWS();
                    } else {
                        await fetch(`/api/meeting/stop/${this.meetingId}`, {method: 'POST'});
                        this.recording = false;
                        clearInterval(this.timer);
                        if (this.ws) this.ws.close();
                    }
                },

                connectWS() {
                    this.ws = new WebSocket(`ws://localhost:7788/ws/translation/${this.meetingId}`);
                    this.ws.onopen = () => this.connected = true;
                    this.ws.onclose = () => this.connected = false;
                    this.ws.onmessage = (e) => {
                        const data = JSON.parse(e.data);
                        this.messages.unshift({
                            id: Date.now(),
                            ...data,
                            time: new Date().toLocaleTimeString()
                        });
                    };
                },

                async translateText() {
                    if (!this.inputText.trim() || this.translating) return;
                    this.translating = true;
                    try {
                        const res = await fetch('/api/translate', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({text: this.inputText})
                        });
                        const data = await res.json();
                        this.messages.unshift({id: Date.now(), ...data, time: new Date().toLocaleTimeString()});
                        this.inputText = '';
                    } finally {
                        this.translating = false;
                    }
                },

                async getSummary() {
                    if (!this.meetingId || this.summarizing) return;
                    this.summarizing = true;
                    try {
                        const res = await fetch(`/api/meeting/summarize/${this.meetingId}`, {method: 'POST'});
                        const data = await res.json();
                        this.summary = data.summary;
                    } finally {
                        this.summarizing = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
